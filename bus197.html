<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#07111f">
<title>Bus Route 197</title>
<style>
:root{--bg:#07111f;--card:#111d30;--card2:#17243a;--text:#f8fafc;--muted:#aab6ca;--green:#45d483;--border:rgba(255,255,255,.11)}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:radial-gradient(circle at top right,#19375e 0,transparent 34%),linear-gradient(180deg,#07111f,#0c1728)}
.app{max-width:760px;margin:auto;padding:calc(18px + env(safe-area-inset-top)) 16px calc(30px + env(safe-area-inset-bottom))}
h1{margin:0 0 5px;font-size:28px} .sub,.status,.route,.footer{color:var(--muted)} .sub{margin-bottom:14px}
.card{background:rgba(17,29,48,.98);border:1px solid var(--border);border-radius:20px;padding:17px;margin-bottom:14px;box-shadow:0 12px 30px rgba(0,0,0,.25)}
button,select{font:inherit} button{width:100%;border:0;border-radius:14px;padding:13px 14px;font-size:16px;font-weight:800;cursor:pointer;margin:5px 0}
.primary{background:var(--green);color:#062413} .secondary{background:var(--card2);color:var(--text);border:1px solid var(--border)}
.direction{text-align:left} .direction span{display:block} .direction .hint{margin-top:6px;font-size:14px;font-weight:700}
.primary .hint{color:#062413;-webkit-text-fill-color:#062413} .secondary .hint{color:#c7d2e3;-webkit-text-fill-color:#c7d2e3}
.status{font-size:13px;line-height:1.4;margin:8px 0 12px} .hidden{display:none!important}
.toolbar{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:12px}
label{display:block;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin:5px 0 6px}
select{width:100%;background:var(--card2);color:var(--text);border:1px solid var(--border);border-radius:14px;padding:13px 14px;font-size:16px;font-weight:750;margin-bottom:10px}
.titleRow{display:flex;justify-content:space-between;gap:10px} .screenTitle{font-size:22px;font-weight:850} .dayPill{font-size:12px;padding:6px 9px;border-radius:999px;background:rgba(69,212,131,.13);color:#9af1ba;white-space:nowrap}
.trip{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center;padding:13px 0;border-bottom:1px solid var(--border)} .trip:last-child{border-bottom:0}
.trip.next{background:rgba(69,212,131,.07);margin:0 -7px;padding:13px 7px;border-radius:13px}
.time{font-size:21px;font-weight:850} .right{text-align:right} .arrow{color:var(--muted);font-size:20px}
.meta{grid-column:1/-1;display:flex;gap:7px;flex-wrap:wrap;align-items:center;color:var(--muted);font-size:13px}
.badge{display:inline-block;padding:5px 9px;border-radius:999px;font-size:12px;font-weight:850} .green{background:#064e3b;color:#bbf7d0} .orange{background:#78350f;color:#fde68a} .red{background:#7f1d1d;color:#fecaca} .last{background:rgba(251,191,36,.13);color:#fde68a;border:1px solid rgba(251,191,36,.42)} .gate{background:rgba(101,167,255,.16);color:#b9d6ff;border:1px solid rgba(101,167,255,.4)}
.empty{padding:24px 8px;text-align:center;color:var(--muted)} .warn{border:1px dashed #f59e0b;background:rgba(120,53,15,.25);color:#fde68a;border-radius:14px;padding:11px;margin:10px 0}
.footer{font-size:12px;line-height:1.5;margin-top:12px}
</style>
</head>
<body>
<div class="app">
<section id="home">
  <h1>🚌 Bus Route 197</h1>
  <div class="sub">Wayne ↔ Port Authority</div>
  <div class="card">
    <div id="status" class="status">Choose a direction, or use your location.</div>
    <button id="locationBtn" class="secondary" type="button">📍 Use My Location</button>
    <button id="goingBtn" class="primary direction" type="button"><span>Going</span><span class="hint">Preakness Shopping Ctr. (Hamburg Tpke at Alps Rd.) → Port Authority</span></button>
    <button id="backBtn" class="secondary direction" type="button"><span>Coming Back</span><span class="hint">Port Authority → Black Oak Ridge Rd. at Jackson Ave.</span></button>
  </div>
</section>

<section id="schedule" class="hidden">
  <div class="toolbar">
    <button id="homeBtn" class="secondary" type="button">← Back</button>
    <button id="fullBtn" class="secondary" type="button">📅 View Full Schedule</button>
  </div>
  <div class="card">
    <label for="daySelect">Schedule to view</label>
    <select id="daySelect">
      <option value="auto">Today / Auto</option>
      <option value="weekday">Monday–Friday</option>
      <option value="sat">Saturday</option>
      <option value="sun">Sunday</option>
    </select>
    <div class="titleRow"><div id="title" class="screenTitle"></div><div id="pill" class="dayPill"></div></div>
    <div id="route" class="route"></div>
    <div id="list"></div>
  </div>
  <div class="footer">Route 197 departures from Port Authority use Gate 233, Door 1 from 6:00 AM–10:00 PM and Gate 307 from 10:01 PM–1:00 AM.</div>
</section>
</div>
<script>
const schedules={"going": {"weekday": [["5:17 AM", "5:59 AM"], ["5:37 AM", "6:22 AM"], ["5:57 AM", "6:46 AM"], ["6:19 AM", "7:08 AM"], ["6:32 AM", "7:21 AM"], ["6:47 AM", "7:39 AM"], ["6:57 AM", "7:46 AM"], ["7:12 AM", "8:01 AM"], ["7:24 AM", "8:13 AM"], ["7:34 AM", "8:26 AM"], ["7:54 AM", "8:43 AM"], ["8:24 AM", "9:10 AM"], ["9:08 AM", "9:49 AM"], ["9:39 AM", "10:34 AM"], ["10:39 AM", "11:34 AM"], ["10:53 AM", "11:34 AM"], ["11:09 AM", "12:04 PM"], ["12:09 PM", "1:04 PM"], ["1:09 PM", "2:04 PM"], ["2:09 PM", "3:05 PM"], ["3:09 PM", "4:10 PM"], ["4:09 PM", "5:15 PM"], ["5:09 PM", "6:15 PM"], ["6:10 PM", "7:02 PM"], ["7:11 PM", "8:02 PM"], ["8:11 PM", "9:02 PM"], ["9:14 PM", "9:59 PM"], ["11:14 PM", "11:59 PM"]], "sat": [["6:10 AM", "6:57 AM"], ["7:10 AM", "7:57 AM"], ["8:10 AM", "8:57 AM"], ["8:40 AM", "9:38 AM"], ["9:09 AM", "10:06 AM"], ["9:25 AM", "10:22 AM"], ["10:06 AM", "11:03 AM"], ["10:25 AM", "11:22 AM"], ["10:36 AM", "11:33 AM"], ["11:06 AM", "12:03 PM"], ["11:25 AM", "12:22 PM"], ["12:06 PM", "1:03 PM"], ["12:36 PM", "1:33 PM"], ["1:06 PM", "2:03 PM"], ["2:09 PM", "3:07 PM"], ["2:39 PM", "3:44 PM"], ["3:09 PM", "4:14 PM"], ["4:09 PM", "5:14 PM"], ["4:39 PM", "5:44 PM"], ["5:09 PM", "6:10 PM"], ["6:09 PM", "6:59 PM"], ["6:39 PM", "7:29 PM"], ["7:09 PM", "7:59 PM"], ["8:09 PM", "8:59 PM"], ["9:08 PM", "9:52 PM"], ["10:08 PM", "10:52 PM"], ["11:08 PM", "11:52 PM"]], "sun": [["6:41 AM", "7:29 AM"], ["8:10 AM", "8:58 AM"], ["9:11 AM", "10:09 AM"], ["10:11 AM", "11:09 AM"], ["11:11 AM", "12:09 PM"], ["12:11 PM", "1:09 PM"], ["1:11 PM", "2:09 PM"], ["2:11 PM", "3:11 PM"], ["3:10 PM", "4:16 PM"], ["4:11 PM", "5:17 PM"], ["5:11 PM", "6:13 PM"], ["6:10 PM", "7:03 PM"], ["7:15 PM", "8:08 PM"], ["8:15 PM", "9:06 PM"], ["9:15 PM", "10:00 PM"], ["11:15 PM", "12:00 AM"]]}, "back": {"weekday": [{"dep": "6:30 AM", "arr": "7:13 AM", "stop": "Preakness Shopping Ctr.", "direct": false}, {"dep": "7:30 AM", "arr": "8:20 AM", "stop": "Preakness Shopping Ctr.", "direct": false}, {"dep": "8:30 AM", "arr": "9:21 AM", "stop": "Preakness Shopping Ctr.", "direct": false}, {"dep": "9:30 AM", "arr": "10:21 AM", "stop": "Preakness Shopping Ctr.", "direct": false}, {"dep": "10:30 AM", "arr": "11:21 AM", "stop": "Preakness Shopping Ctr.", "direct": false}, {"dep": "11:30 AM", "arr": "12:21 PM", "stop": "Preakness Shopping Ctr.", "direct": false}, {"dep": "12:30 PM", "arr": "1:21 PM", "stop": "Preakness Shopping Ctr.", "direct": false}, {"dep": "1:30 PM", "arr": "2:21 PM", "stop": "Preakness Shopping Ctr.", "direct": false}, {"dep": "2:30 PM", "arr": "3:21 PM", "stop": "Preakness Shopping Ctr.", "direct": false}, {"dep": "3:30 PM", "arr": "4:35 PM", "stop": "Preakness Shopping Ctr.", "direct": false}, {"dep": "4:15 PM", "arr": "5:09 PM", "stop": "Preakness Shopping Ctr.", "direct": false}, {"dep": "4:43 PM", "arr": "5:40 PM", "stop": "Preakness Shopping Ctr.", "direct": false}, {"dep": "4:56 PM", "arr": "5:49 PM", "stop": "Black Oak Ridge Rd. at Jackson Ave.", "direct": true}, {"dep": "5:16 PM", "arr": "6:10 PM", "stop": "Preakness Shopping Ctr.", "direct": false}, {"dep": "5:32 PM", "arr": "6:28 PM", "stop": "Preakness Shopping Ctr.", "direct": false}, {"dep": "5:48 PM", "arr": "6:38 PM", "stop": "Preakness Shopping Ctr.", "direct": false}, {"dep": "5:56 PM", "arr": "6:46 PM", "stop": "Black Oak Ridge Rd. at Jackson Ave.", "direct": true}, {"dep": "6:12 PM", "arr": "6:58 PM", "stop": "Preakness Shopping Ctr.", "direct": false}, {"dep": "6:25 PM", "arr": "7:15 PM", "stop": "Preakness Shopping Ctr.", "direct": false}, {"dep": "6:40 PM", "arr": "7:25 PM", "stop": "Preakness Shopping Ctr.", "direct": false}, {"dep": "7:15 PM", "arr": "8:07 PM", "stop": "Preakness Shopping Ctr.", "direct": false}, {"dep": "7:30 PM", "arr": "8:15 PM", "stop": "Preakness Shopping Ctr.", "direct": false}, {"dep": "8:00 PM", "arr": "8:52 PM", "stop": "Preakness Shopping Ctr.", "direct": false}, {"dep": "8:30 PM", "arr": "9:20 PM", "stop": "Preakness Shopping Ctr.", "direct": false}, {"dep": "9:30 PM", "arr": "10:15 PM", "stop": "Preakness Shopping Ctr.", "direct": false}, {"dep": "11:00 PM", "arr": "11:45 PM", "stop": "Preakness Shopping Ctr.", "direct": false}, {"dep": "12:30 AM", "arr": "1:14 AM", "stop": "Preakness Shopping Ctr.", "direct": false}], "sat": [{"dep": "7:30 AM", "arr": "8:19 AM", "stop": "Preakness Shopping Ctr.", "direct": false}, {"dep": "8:30 AM", "arr": "9:21 AM", "stop": "Preakness Shopping Ctr.", "direct": false}, {"dep": "9:30 AM", "arr": "10:26 AM", "stop": "Preakness Shopping Ctr.", "direct": false}, {"dep": "10:00 AM", "arr": "10:56 AM", "stop": "Preakness Shopping Ctr.", "direct": false}, {"dep": "10:30 AM", "arr": "11:26 AM", "stop": "Preakness Shopping Ctr.", "direct": false}, {"dep": "11:30 AM", "arr": "12:26 PM", "stop": "Preakness Shopping Ctr.", "direct": false}, {"dep": "12:00 PM", "arr": "12:56 PM", "stop": "Preakness Shopping Ctr.", "direct": false}, {"dep": "12:30 PM", "arr": "1:26 PM", "stop": "Preakness Shopping Ctr.", "direct": false}, {"dep": "1:30 PM", "arr": "2:26 PM", "stop": "Preakness Shopping Ctr.", "direct": false}, {"dep": "2:00 PM", "arr": "2:56 PM", "stop": "Preakness Shopping Ctr.", "direct": false}, {"dep": "2:30 PM", "arr": "3:26 PM", "stop": "Preakness Shopping Ctr.", "direct": false}, {"dep": "3:30 PM", "arr": "4:27 PM", "stop": "Preakness Shopping Ctr.", "direct": false}, {"dep": "4:00 PM", "arr": "4:57 PM", "stop": "Preakness Shopping Ctr.", "direct": false}, {"dep": "4:30 PM", "arr": "5:27 PM", "stop": "Preakness Shopping Ctr.", "direct": false}, {"dep": "5:15 PM", "arr": "6:11 PM", "stop": "Preakness Shopping Ctr.", "direct": false}, {"dep": "5:30 PM", "arr": "6:25 PM", "stop": "Preakness Shopping Ctr.", "direct": false}, {"dep": "6:00 PM", "arr": "6:51 PM", "stop": "Preakness Shopping Ctr.", "direct": false}, {"dep": "6:20 PM", "arr": "7:11 PM", "stop": "Preakness Shopping Ctr.", "direct": false}, {"dep": "6:30 PM", "arr": "7:21 PM", "stop": "Preakness Shopping Ctr.", "direct": false}, {"dep": "7:15 PM", "arr": "8:06 PM", "stop": "Preakness Shopping Ctr.", "direct": false}, {"dep": "7:30 PM", "arr": "8:21 PM", "stop": "Preakness Shopping Ctr.", "direct": false}, {"dep": "8:00 PM", "arr": "8:51 PM", "stop": "Preakness Shopping Ctr.", "direct": false}, {"dep": "8:30 PM", "arr": "9:17 PM", "stop": "Preakness Shopping Ctr.", "direct": false}, {"dep": "9:30 PM", "arr": "10:17 PM", "stop": "Preakness Shopping Ctr.", "direct": false}, {"dep": "10:30 PM", "arr": "11:17 PM", "stop": "Preakness Shopping Ctr.", "direct": false}, {"dep": "11:00 PM", "arr": "11:47 PM", "stop": "Preakness Shopping Ctr.", "direct": false}, {"dep": "12:30 AM", "arr": "1:13 AM", "stop": "Preakness Shopping Ctr.", "direct": false}], "sun": [{"dep": "7:45 AM", "arr": "8:29 AM", "stop": "Preakness Shopping Ctr.", "direct": false}, {"dep": "9:30 AM", "arr": "10:23 AM", "stop": "Preakness Shopping Ctr.", "direct": false}, {"dep": "10:30 AM", "arr": "11:23 AM", "stop": "Preakness Shopping Ctr.", "direct": false}, {"dep": "11:30 AM", "arr": "12:23 PM", "stop": "Preakness Shopping Ctr.", "direct": false}, {"dep": "12:30 PM", "arr": "1:23 PM", "stop": "Preakness Shopping Ctr.", "direct": false}, {"dep": "1:30 PM", "arr": "2:23 PM", "stop": "Preakness Shopping Ctr.", "direct": false}, {"dep": "2:30 PM", "arr": "3:23 PM", "stop": "Preakness Shopping Ctr.", "direct": false}, {"dep": "3:30 PM", "arr": "4:24 PM", "stop": "Preakness Shopping Ctr.", "direct": false}, {"dep": "4:30 PM", "arr": "5:24 PM", "stop": "Preakness Shopping Ctr.", "direct": false}, {"dep": "5:30 PM", "arr": "6:21 PM", "stop": "Preakness Shopping Ctr.", "direct": false}, {"dep": "6:30 PM", "arr": "7:20 PM", "stop": "Preakness Shopping Ctr.", "direct": false}, {"dep": "7:30 PM", "arr": "8:20 PM", "stop": "Preakness Shopping Ctr.", "direct": false}, {"dep": "8:30 PM", "arr": "9:19 PM", "stop": "Preakness Shopping Ctr.", "direct": false}, {"dep": "9:30 PM", "arr": "10:14 PM", "stop": "Preakness Shopping Ctr.", "direct": false}, {"dep": "11:00 PM", "arr": "11:44 PM", "stop": "Preakness Shopping Ctr.", "direct": false}, {"dep": "12:30 AM", "arr": "1:15 AM", "stop": "Preakness Shopping Ctr.", "direct": false}]}};
let direction="going",selectedDay="auto",full=false;
const $=id=>document.getElementById(id);
function todayType(){const d=new Date().getDay();return d===6?"sat":d===0?"sun":"weekday";}
function activeType(){return selectedDay==="auto"?todayType():selectedDay;}
function serviceDate(type){const d=new Date();d.setHours(0,0,0,0);if(selectedDay==="auto")return d;const target=type==="weekday"?1:type==="sat"?6:0;let delta=(target-d.getDay()+7)%7;if(type==="weekday"&&d.getDay()>=1&&d.getDay()<=5)delta=0;d.setDate(d.getDate()+delta);return d;}
function parseTime(str,date){const [hm,ap]=str.split(" ");let [h,m]=hm.split(":").map(Number);if(ap==="PM"&&h!==12)h+=12;if(ap==="AM"&&h===12)h=0;const d=new Date(date);d.setHours(h,m,0,0);return d;}
function formatWait(ms){const mins=Math.max(0,Math.ceil(ms/60000)),days=Math.floor(mins/1440),left=mins%1440,hrs=Math.floor(left/60),rem=left%60,parts=[];if(days)parts.push(days+" day"+(days===1?"":"s"));if(hrs)parts.push(hrs+" hr");if(rem||!parts.length)parts.push(rem+" min");return parts.join(" ");}
function gateFor(dep){if(direction!=="back")return"";const [hm,ap]=dep.split(" ");let [h,m]=hm.split(":").map(Number);if(ap==="PM"&&h!==12)h+=12;if(ap==="AM"&&h===12)h=0;const total=h*60+m;return total>=1321||total<60?'<span class="badge gate">Gate 307</span>':'<span class="badge gate">Gate 233 · Door 1</span>';}
function countdown(ms){if(ms<=-60000)return"<span>Departed</span>";if(ms<60000)return'<span class="badge red">Leaving now</span>';const mins=Math.ceil(ms/60000),cls=mins<5?"red":mins<15?"orange":"green";return'<span class="badge '+cls+'">Leaves in '+formatWait(ms)+'</span>';}
function openDirection(dir){direction=dir;selectedDay="auto";full=false;$("daySelect").value="auto";$("home").classList.add("hidden");$("schedule").classList.remove("hidden");render();}
function render(){
  const type=activeType(),date=serviceDate(type),rows=schedules[direction][type]||[],now=new Date();
  $("title").textContent=direction==="going"?"Going":"Coming Back";
  $("route").textContent=direction==="going"?"Preakness Shopping Ctr. → Port Authority":"Port Authority → Black Oak Ridge Rd. / Preakness alternatives";
  $("pill").textContent=(type==="weekday"?"Mon–Fri":type==="sat"?"Saturday":"Sunday")+" · "+date.toLocaleDateString("en-US",{month:"short",day:"numeric"});
  $("fullBtn").textContent=full?"⏱ Show Next 2 Hours":"📅 View Full Schedule";
  if(!rows.length){$("list").innerHTML='<div class="warn">No Route 197 service is listed for this day.</div>';return;}
  const trips=rows.map((r,i)=>({dep:r.dep||r[0],arr:r.arr||r[1],stop:r.stop||"",direct:r.direct!==false,date:parseTime(r.dep||r[0],date),last:i===rows.length-1}));
  const visible=full?trips:trips.filter(t=>t.date-now>=0&&t.date-now<=7200000);
  if(!visible.length){$("list").innerHTML='<div class="empty">No buses in the next 2 hours.</div>';return;}
  $("list").innerHTML=visible.map((t,i)=>{const ms=t.date-now,last=t.last?'<span class="badge last">Last Bus</span>':'',stopBadge=direction==="back"?(t.direct?'<span class="badge green">Direct to Black Oak</span>':'<span class="badge orange">Arrives Preakness only</span>'):"";return'<div class="trip '+(!full&&i===0?"next":"")+'"><div><div class="time">'+t.dep+'</div><div class="route">Depart</div></div><div class="arrow">→</div><div class="right"><div class="time">'+t.arr+'</div><div class="route">'+(t.stop||"Arrive")+'</div></div><div class="meta">'+gateFor(t.dep)+stopBadge+last+countdown(ms)+'</div></div>';}).join("");
}
function useLocation(){
  const btn=$("locationBtn"),status=$("status");
  if(!window.isSecureContext){status.textContent="Location requires the HTTPS GitHub Pages link.";return;}
  if(!navigator.geolocation){status.textContent="Location is unavailable. Choose a direction below.";return;}
  btn.disabled=true;btn.textContent="Finding location…";
  navigator.geolocation.getCurrentPosition(p=>{
    const lat=p.coords.latitude,lon=p.coords.longitude,rad=x=>x*Math.PI/180;
    const dist=(a,b,c,d)=>{const R=3958.8,dl=rad(c-a),dn=rad(d-b),q=Math.sin(dl/2)**2+Math.cos(rad(a))*Math.cos(rad(c))*Math.sin(dn/2)**2;return 2*R*Math.asin(Math.sqrt(q));};
    const wayne=dist(lat,lon,40.947,-74.225),pabt=dist(lat,lon,40.7569,-73.9903),dir=wayne<=pabt?"going":"back";
    btn.disabled=false;btn.textContent="📍 Use My Location";status.textContent="Nearest commute side detected.";openDirection(dir);
  },()=>{btn.disabled=false;btn.textContent="📍 Try My Location Again";status.textContent="Location could not be detected. Choose a direction below.";},
  {enableHighAccuracy:true,timeout:15000,maximumAge:60000});
}
$("goingBtn").addEventListener("click",()=>openDirection("going"));
$("backBtn").addEventListener("click",()=>openDirection("back"));
$("homeBtn").addEventListener("click",()=>{$("schedule").classList.add("hidden");$("home").classList.remove("hidden");});
$("fullBtn").addEventListener("click",()=>{full=!full;render();});
$("daySelect").addEventListener("change",e=>{selectedDay=e.target.value;full=selectedDay!=="auto";render();});
$("locationBtn").addEventListener("click",useLocation);
setInterval(()=>{if(!$("schedule").classList.contains("hidden"))render();},60000);
</script>
</body>
</html>
