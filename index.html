  if (t.includes('medium-long')) return 'Medium-long';
  if (t.includes('long run')) return 'Long';
  if (t.includes('lactate')) return 'Lactate';
  if (t.includes('marathon-pace')) return 'Marathon-pace';
  if (t.includes('tune-up')) return 'Tune-up';
  return 'General';
}
function esc(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function weekSunday(raceDate, weekNum) { return addDays(stripTime(raceDate), -7 * weekNum); }
function renderWeek(title, weekNum, raceDate) {
  const plan = selectedPlan();
  const week = plan[String(weekNum)];
  if (!week) return `<section class="week"><div class="empty">No data found for week ${weekNum}.</div></section>`;
  const sunday = weekSunday(raceDate, weekNum);
  const monday = addDays(sunday, -6);
  let rows = '';
  DAY_NAMES.forEach((day, i) => {
    const d = addDays(monday, i);
    const item = (week.days && week.days[day]) ? week.days[day] : { workout:'', mesocycle:'' };
    const type = classify(item.workout);
    const todayClass = stripTime(d).getTime() === stripTime(new Date()).getTime() ? ' today' : '';
    rows += `<div class="day${todayClass}"><div class="date">${esc(day.slice(0,3))}<small>${esc(dateLabel(d))}</small></div><div class="workout"><span class="type ${esc(type)}">${esc(type)}</span>${esc(item.workout)}</div></div>`;
  });
  const header = week.header || (weekNum === 0 ? 'Race Week' : `${weekNum} Weeks to Goal`);
  const goalWeek = weekNum + 1;
  const label = goalWeek === 1 ? 'Week 1 to Goal • Race Week' : `Week ${goalWeek} to Goal`;
  return `<section class="week"><div class="weekhead"><div><h2>${esc(title)}</h2><p class="sub">${esc(header)} • ${esc(fullDateLabel(monday))} – ${esc(fullDateLabel(sunday))}</p></div><span class="tag">${esc(label)}</span></div><div class="tag" style="margin-bottom:8px">${esc(week.volume || '')}</div>${rows}</section>`;
}
function refreshKpis() {
  const race = parseLocalDate(raceDateEl.value);
  const plan = selectedPlan();
  planNameEl.textContent = `${mileageEl.value}/${durationEl.value}`;
  if (!race) { countdownEl.textContent = '—'; weekNowEl.textContent = '—'; return null; }
  const left = daysUntilRace(race);
  const wk = currentWeekNumber(race, plan);
  countdownEl.textContent = left < 0 ? 'Done' : left;
  weekNowEl.textContent = wk === 0 ? 'Week 1 / Race' : `Week ${wk + 1}`;
  return { race, plan, week: wk };
}
function saveSettings() { safeSetItem('marathonRaceDate', raceDateEl.value); safeSetItem('marathonMileage', mileageEl.value); safeSetItem('marathonDuration', durationEl.value); }
function loadSettings() {
  const d = safeGetItem('marathonRaceDate'); const m = safeGetItem('marathonMileage'); const w = safeGetItem('marathonDuration');
  if (d) raceDateEl.value = d; if (m) mileageEl.value = m; if (w) durationEl.value = w;
}
function renderCurrentNext() {
  saveSettings();
  const k = refreshKpis();
  if (!k) { outputEl.innerHTML = '<section class="week"><div class="empty">Select a marathon date, then tap Show Current + Next Week.</div></section>'; return; }
  const next = Math.max(0, k.week - 1);
  outputEl.innerHTML = renderWeek('Current Week', k.week, k.race) + (next === k.week ? '' : renderWeek('Next Week', next, k.race));
}
function renderAllWeeks() {
  saveSettings();
  const k = refreshKpis();
  if (!k) { outputEl.innerHTML = '<section class="week"><div class="empty">Select a marathon date, then tap Show Remaining Plan.</div></section>'; return; }

  // Show only remaining weeks. Internal week 0 is Race Week / Week 1 to Goal.
  // If current week is 8, remaining plan is 8, 7, 6 ... 0.
  // This uses the exact same currentWeekNumber() output as Current + Next Week.
  const nums = Object.keys(k.plan)
    .map(Number)
    .filter(n => Number.isFinite(n) && n <= k.week)
    .sort((a,b) => b-a);

  if (!nums.length) {
    outputEl.innerHTML = '<section class="week"><div class="empty">No remaining weeks found for this race date.</div></section>';
    return;
  }

  outputEl.innerHTML = nums.map(n => {
    let title = n === k.week ? 'Current Week' : (n === 0 ? 'Week 1 to Goal — Race Week' : `Week ${n + 1} to Goal`);
    return renderWeek(title, n, k.race);
  }).join('');
}

loadSettings();
[todayBtn, raceDateEl, mileageEl, durationEl].forEach(el => el.addEventListener('change', renderCurrentNext));
raceDateEl.addEventListener('input', renderCurrentNext);
todayBtn.addEventListener('click', renderCurrentNext);
allBtn.addEventListener('click', renderAllWeeks);
refreshKpis();
renderCurrentNext();
</script></body></html>
