<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bus Commute</title>
<style>
:root{--bg:#0f172a;--card:#111827;--muted:#94a3b8;--text:#f8fafc;--accent:#22c55e;--warn:#f59e0b;--danger:#ef4444;--border:#253044;--blue:#38bdf8}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:linear-gradient(180deg,#111827,#020617);color:var(--text);min-height:100vh}.app{max-width:560px;margin:0 auto;padding:18px 14px 36px}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}.title{font-size:26px;font-weight:850}.clock{text-align:right;color:var(--muted);font-size:13px}.card{background:rgba(17,24,39,.93);border:1px solid var(--border);border-radius:18px;padding:16px;margin:12px 0;box-shadow:0 12px 30px rgba(0,0,0,.25)}button{width:100%;border:0;border-radius:16px;padding:15px 14px;margin:8px 0;background:#1f2937;color:var(--text);font-size:16px;font-weight:750;text-align:left;cursor:pointer;border:1px solid var(--border)}button:active{transform:scale(.99)}.primary{background:#14532d;border-color:#166534}.alt{background:#0c4a6e;border-color:#0369a1}.secondary{background:#0f172a}.smallBtn{font-size:14px;padding:11px 12px;text-align:center}.row{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center;padding:12px 0;border-bottom:1px solid var(--border)}.row:last-child{border-bottom:0}.time{font-size:22px;font-weight:850}.label{font-size:12px;color:var(--muted);margin-top:3px}.arrow{color:var(--muted);font-weight:800}.badge{display:inline-block;padding:4px 9px;border-radius:999px;font-size:12px;font-weight:850;margin-bottom:6px}.green{background:#064e3b;color:#bbf7d0}.orange{background:#78350f;color:#fde68a}.red{background:#7f1d1d;color:#fecaca}.blue{background:#0c4a6e;color:#bae6fd}.hidden{display:none}.muted{color:var(--muted);font-size:14px;line-height:1.4}.screenTitle{font-size:21px;font-weight:850;margin:10px 0 4px}.route{color:var(--muted);font-size:14px;margin-bottom:12px}.footer{color:var(--muted);font-size:12px;line-height:1.45;margin-top:16px}.empty{padding:14px;text-align:center;color:var(--muted)}.pill{display:inline-block;padding:4px 8px;border:1px solid var(--border);border-radius:999px;color:#bbf7d0;font-size:12px;margin-left:6px}.gate{color:#bbf7d0;font-size:13px;margin:6px 0}.locStatus{font-size:13px;color:var(--muted);line-height:1.4;margin:8px 0 4px}.stack{display:flex;gap:8px}.stack button{margin:6px 0}.routeName{font-size:13px;color:var(--muted);font-weight:500;margin-top:3px;display:block}.subhead{font-size:13px;font-weight:800;color:#bae6fd;margin:14px 0 2px}.warnBox{border:1px dashed #f59e0b;border-radius:14px;padding:12px;margin:12px 0;color:#fde68a;background:rgba(120,53,15,.25)}
</style>
</head>
<body>
<div class="app">
  <div class="top"><div class="title">🚌 Commute</div><div class="clock"><div id="nowText">--</div><div>Weekday schedule</div></div></div>
  <section id="home" class="card"><div class="screenTitle">Choose Direction</div><div id="locationStatus" class="locStatus">Checking your nearest side…</div><div id="directionButtons"></div><div class="stack"><button class="secondary smallBtn" onclick="detectLocation()">📍 Use My Location</button><button class="secondary smallBtn" onclick="swapOrder()">↕️ Swap</button></div><div class="footer">131 is shown first. 139 appears automatically when no 131 bus is available in the next 2 hours, and you can open 139 any time.</div></section>
  <section id="scheduleScreen" class="hidden"><div class="card"><button class="secondary" onclick="showHome()">← Back</button><div class="screenTitle" id="dirTitle"></div><div class="route" id="dirRoute"></div><div id="activeNote" class="gate"></div><button id="toggleBtn" onclick="toggleFull()">📅 View Full Schedule</button><button class="alt" id="show139Btn" onclick="toggle139()">🚌 Show 139 Option</button><div id="list"></div></div></section>
</div>
<script>
const stops={ernston:{name:'Ernston Rd & Washington Rd',lat:40.4587,lon:-74.3020},oldbridge:{name:'Old Bridge Park & Ride',lat:40.4119,lon:-74.3013},pabt:{name:'Port Authority Bus Terminal',lat:40.7569,lon:-73.9903}};
const schedules={
  going:{title:'🚍 Going',route:'Ernston Rd & Washington Rd → Port Authority',fallbackRoute:'Old Bridge Park & Ride → Port Authority',mainKey:'131_go',altKey:'139_go'},
  back:{title:'🏠 Coming Back',route:'Port Authority → Ernston Rd & Washington Rd',fallbackRoute:'Port Authority → Old Bridge Park & Ride',mainKey:'131_back',altKey:'139_back'}
};
const routeData={
 '131_go':{routeNo:'131',note:'Bus 131 from Ernston Rd & Washington Rd to Port Authority.',trips:[['5:40 AM','6:26 AM'],['6:14 AM','7:00 AM'],['6:29 AM','7:15 AM'],['6:44 AM','7:30 AM'],['6:59 AM','7:45 AM'],['7:11 AM','7:57 AM'],['7:23 AM','8:09 AM'],['7:35 AM','8:21 AM'],['7:50 AM','8:36 AM'],['8:05 AM','8:51 AM'],['8:20 AM','9:06 AM'],['8:40 AM','9:26 AM']]},
 '131_back':{routeNo:'131',note:'Route 131 departs Port Authority from Gate 317.',trips:[['3:30 PM','4:21 PM'],['4:00 PM','4:53 PM'],['4:30 PM','5:23 PM'],['4:50 PM','5:43 PM'],['5:10 PM','6:03 PM'],['5:30 PM','6:22 PM'],['5:50 PM','6:41 PM'],['6:10 PM','7:00 PM'],['6:30 PM','7:20 PM'],['7:00 PM','7:50 PM'],['7:30 PM','8:20 PM'],['8:30 PM','9:20 PM']]},
 '139_go':{routeNo:'139',note:'Backup option: board at Old Bridge Park & Ride, arrive Port Authority.',trips:[['2:47 AM','3:26 AM'],['3:51 AM','4:31 AM'],['4:18 AM','4:58 AM'],['4:33 AM','5:13 AM'],['4:48 AM','5:28 AM'],['4:53 AM','5:33 AM'],['5:05 AM','5:45 AM'],['5:11 AM','5:52 AM'],['5:15 AM','5:55 AM'],['5:20 AM','6:00 AM'],['5:23 AM','6:03 AM'],['5:25 AM','6:05 AM'],['5:28 AM','6:08 AM'],['5:30 AM','6:11 AM'],['5:33 AM','6:14 AM'],['5:40 AM','6:21 AM'],['5:43 AM','6:24 AM'],['5:46 AM','6:27 AM'],['5:49 AM','6:30 AM'],['5:53 AM','6:35 AM'],['6:00 AM','6:42 AM'],['6:03 AM','6:45 AM'],['6:07 AM','6:49 AM'],['6:09 AM','6:51 AM'],['6:14 AM','6:56 AM'],['6:18 AM','7:00 AM'],['6:23 AM','7:05 AM'],['6:30 AM','7:12 AM'],['6:31 AM','7:13 AM'],['6:34 AM','7:16 AM'],['6:36 AM','7:18 AM'],['6:40 AM','7:22 AM'],['6:43 AM','7:25 AM'],['6:48 AM','7:30 AM'],['6:54 AM','7:36 AM'],['6:56 AM','7:38 AM'],['6:57 AM','7:39 AM'],['6:59 AM','7:41 AM'],['7:00 AM','7:42 AM'],['7:01 AM','7:43 AM'],['7:08 AM','7:50 AM'],['7:11 AM','7:53 AM'],['7:13 AM','7:55 AM'],['7:25 AM','8:07 AM'],['7:26 AM','8:08 AM'],['7:28 AM','8:10 AM'],['7:30 AM','8:12 AM'],['7:33 AM','8:15 AM'],['7:38 AM','8:20 AM'],['7:41 AM','8:23 AM'],['7:43 AM','8:25 AM'],['7:48 AM','8:30 AM'],['7:53 AM','8:35 AM'],['7:56 AM','8:38 AM'],['8:06 AM','8:48 AM'],['8:11 AM','8:53 AM'],['8:16 AM','8:58 AM'],['8:21 AM','9:03 AM'],['8:26 AM','9:08 AM'],['8:32 AM','9:13 AM'],['8:39 AM','9:20 AM'],['8:42 AM','9:23 AM'],['8:46 AM','9:27 AM'],['8:53 AM','9:33 AM'],['9:00 AM','9:40 AM'],['9:13 AM','9:53 AM'],['9:19 AM','9:59 AM'],['9:31 AM','10:11 AM'],['9:43 AM','10:23 AM'],['9:55 AM','10:35 AM'],['10:07 AM','10:47 AM'],['10:19 AM','10:59 AM'],['10:31 AM','11:11 AM'],['10:46 AM','11:26 AM'],['11:01 AM','11:41 AM'],['11:16 AM','11:56 AM'],['11:31 AM','12:11 PM'],['12:01 PM','12:41 PM'],['12:16 PM','12:56 PM'],['12:31 PM','1:11 PM'],['12:46 PM','1:26 PM'],['1:01 PM','1:41 PM'],['1:16 PM','1:56 PM'],['1:31 PM','2:11 PM'],['2:01 PM','2:41 PM'],['2:31 PM','3:11 PM'],['3:01 PM','3:41 PM'],['3:31 PM','4:11 PM'],['4:01 PM','4:41 PM'],['4:31 PM','5:11 PM'],['5:01 PM','5:41 PM'],['5:31 PM','6:11 PM'],['6:01 PM','6:41 PM'],['6:31 PM','7:11 PM'],['7:01 PM','7:41 PM'],['8:01 PM','8:41 PM'],['9:01 PM','9:41 PM'],['10:01 PM','10:41 PM'],['11:01 PM','11:41 PM']]},
 '139_back':{routeNo:'139',note:'Backup option: board at Port Authority, get off at Old Bridge Park & Ride.',trips:[['4:00 AM','4:37 AM'],['5:00 AM','5:37 AM'],['6:01 AM','6:41 AM'],['6:30 AM','7:10 AM'],['7:00 AM','7:40 AM'],['7:30 AM','8:10 AM'],['8:00 AM','8:40 AM'],['8:30 AM','9:10 AM'],['9:00 AM','9:40 AM'],['9:30 AM','10:10 AM'],['10:00 AM','10:40 AM'],['10:30 AM','11:10 AM'],['11:00 AM','11:40 AM'],['11:30 AM','12:10 PM'],['12:00 PM','12:40 PM'],['12:15 PM','12:55 PM'],['12:30 PM','1:10 PM'],['12:45 PM','1:30 PM'],['1:00 PM','1:45 PM'],['1:15 PM','2:00 PM'],['1:30 PM','2:15 PM'],['1:45 PM','2:27 PM'],['2:00 PM','2:43 PM'],['2:10 PM','2:53 PM'],['2:20 PM','3:07 PM'],['2:30 PM','3:18 PM'],['2:40 PM','3:30 PM'],['2:50 PM','3:37 PM'],['3:00 PM','3:49 PM'],['3:10 PM','3:59 PM'],['3:22 PM','4:09 PM'],['3:34 PM','4:21 PM'],['3:46 PM','4:39 PM'],['3:58 PM','4:59 PM'],['4:10 PM','5:23 PM'],['4:22 PM','5:13 PM'],['4:34 PM','5:22 PM'],['4:48 PM','6:12 PM'],['5:00 PM','5:50 PM'],['5:09 PM','5:59 PM'],['5:15 PM','6:05 PM'],['5:27 PM','6:16 PM'],['5:34 PM','6:22 PM'],['5:40 PM','6:30 PM'],['5:48 PM','6:38 PM'],['5:58 PM','7:22 PM'],['6:10 PM','7:07 PM'],['6:25 PM','7:07 PM'],['6:40 PM','7:22 PM'],['6:55 PM','7:37 PM'],['7:15 PM','7:56 PM'],['7:30 PM','8:11 PM'],['7:45 PM','8:26 PM'],['8:00 PM','8:41 PM'],['8:15 PM','9:01 PM'],['8:45 PM','9:25 PM'],['9:15 PM','10:01 PM'],['9:45 PM','10:24 PM'],['10:00 PM','10:39 PM'],['10:15 PM','11:00 PM'],['10:30 PM','11:09 PM'],['11:00 PM','11:39 PM']]}
};
let currentDir='going', full=false, showAlt=false, order=['going','back'], autoOpened=false;
function renderHome(){const wrap=document.getElementById('directionButtons');wrap.innerHTML='';order.forEach((dir,idx)=>{const d=schedules[dir];const b=document.createElement('button');b.className=idx===0?'primary':'';b.onclick=()=>openDirection(dir);b.innerHTML=`${d.title}${idx===0?'<span class="pill">Nearest</span>':''}<span class="routeName">131: ${d.route}</span><span class="routeName">139 backup: ${d.fallbackRoute}</span>`;wrap.appendChild(b);});}
function detectLocation(){const status=document.getElementById('locationStatus');if(!navigator.geolocation){status.textContent='Location not supported. Use Swap if needed.';renderHome();return;}status.textContent='Checking your location…';navigator.geolocation.getCurrentPosition(pos=>{const here={lat:pos.coords.latitude,lon:pos.coords.longitude};const dNJ=Math.min(distanceMiles(here,stops.ernston),distanceMiles(here,stops.oldbridge));const dNY=distanceMiles(here,stops.pabt);if(dNJ<=dNY){order=['going','back'];status.textContent=`Nearest commute side: New Jersey (${dNJ.toFixed(1)} mi). Showing Going first.`;}else{order=['back','going'];status.textContent=`Nearest commute side: Port Authority (${dNY.toFixed(1)} mi). Showing Coming Back first.`;}localStorage.setItem('busOrder',JSON.stringify(order));renderHome();if(!autoOpened){autoOpened=true;openDirection(order[0]);}},()=>{status.textContent='Location permission not available. Showing saved/default order.';renderHome();},{enableHighAccuracy:true,timeout:8000,maximumAge:60000});}
function swapOrder(){order=[...order].reverse();localStorage.setItem('busOrder',JSON.stringify(order));document.getElementById('locationStatus').textContent='Manual order saved.';renderHome();}
function distanceMiles(a,b){const R=3958.8,toRad=x=>x*Math.PI/180;const dLat=toRad(b.lat-a.lat),dLon=toRad(b.lon-a.lon),lat1=toRad(a.lat),lat2=toRad(b.lat);const h=Math.sin(dLat/2)**2+Math.cos(lat1)*Math.cos(lat2)*Math.sin(dLon/2)**2;return 2*R*Math.asin(Math.sqrt(h));}
function parseToday(t){const [hm,ap]=t.split(' ');let [h,m]=hm.split(':').map(Number);if(ap==='PM'&&h!==12)h+=12;if(ap==='AM'&&h===12)h=0;const d=new Date();d.setHours(h,m,0,0);return d;}
function minsUntil(t){return Math.round((parseToday(t)-new Date())/60000)}
function isWeekend(){const d=new Date().getDay();return d===0||d===6}
function badge(min){if(min<5)return['red','Leaves in '+min+' min'];if(min<15)return['orange','Leaves in '+min+' min'];return['green','Leaves in '+min+' min'];}
function getTrips(key,onlyNext=true){let trips=routeData[key].trips.map(x=>({dep:x[0],arr:x[1],min:minsUntil(x[0])}));return onlyNext?trips.filter(x=>x.min>=0&&x.min<=120):trips;}
function renderTrips(title,key,notice){const box=document.createElement('div');box.innerHTML=`<div class="subhead">${title}</div>`;if(notice)box.innerHTML+=`<div class="warnBox">${notice}</div>`;const d=routeData[key];box.innerHTML+=`<div class="gate">${d.note}</div>`;let trips=getTrips(key,!full);if(trips.length===0){box.innerHTML+='<div class="empty">No buses in this view.</div>';return box;}trips.forEach((x,i)=>{const r=document.createElement('div');r.className='row';let b='';if(!full&&i===0){const bb=badge(x.min);b=`<span class="badge ${bb[0]}">${bb[1]}</span>`;}r.innerHTML=`<div>${b}<div class="time">${x.dep}</div><div class="label">Depart</div></div><div class="arrow">→</div><div><div class="time">${x.arr}</div><div class="label">Arrive</div></div>`;box.appendChild(r);});return box;}
function render(){const d=schedules[currentDir];document.getElementById('dirTitle').textContent=d.title;document.getElementById('dirRoute').textContent=showAlt?`139: ${d.fallbackRoute}`:`131: ${d.route}`;document.getElementById('toggleBtn').textContent=full?'⏱ Show Next 2 Hours':'📅 View Full Schedule';document.getElementById('show139Btn').textContent=showAlt?'🚌 Show 131':'🚌 Show 139 Option';const list=document.getElementById('list');list.innerHTML='';if(isWeekend()){list.innerHTML='<div class="empty">Weekend service differs. Check NJ Transit before traveling.</div>';return;}const mainNext=getTrips(d.mainKey,true);if(showAlt){list.appendChild(renderTrips('Route 139 Option',d.altKey,''));return;}list.appendChild(renderTrips('Route 131',d.mainKey,''));if(!full&&mainNext.length===0){const altNext=getTrips(d.altKey,true);if(altNext.length>0){list.appendChild(renderTrips('Route 139 Backup',d.altKey,'No 131 buses in the next 2 hours. Showing 139 backup.'));}else{list.innerHTML+='<div class="empty">No 131 or 139 buses found in the next 2 hours.</div>';}}}
function openDirection(dir){currentDir=dir;full=false;showAlt=false;document.getElementById('home').classList.add('hidden');document.getElementById('scheduleScreen').classList.remove('hidden');render();}
function showHome(){document.getElementById('scheduleScreen').classList.add('hidden');document.getElementById('home').classList.remove('hidden');renderHome();}
function toggleFull(){full=!full;render();}
function toggle139(){showAlt=!showAlt;full=false;render();}
function tick(){document.getElementById('nowText').textContent=new Date().toLocaleTimeString([],{hour:'numeric',minute:'2-digit'});if(!document.getElementById('scheduleScreen').classList.contains('hidden'))render();}
function init(){try{const saved=JSON.parse(localStorage.getItem('busOrder'));if(Array.isArray(saved)&&saved.length===2)order=saved;}catch(e){}renderHome();detectLocation();tick();}init();setInterval(tick,60000);
</script>
</body>
</html>
