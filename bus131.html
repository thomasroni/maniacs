<style>
:root{--bg:#07111f;--card:#111d30;--card2:#17243a;--text:#f8fafc;--muted:#aab6ca;--green:#45d483;--blue:#68a8ff;--border:rgba(255,255,255,.11);--warn:#fbbf24}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;background:radial-gradient(circle at top right,#19375e 0,transparent 34%),linear-gradient(180deg,#07111f,#0c1728);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}
.app{max-width:760px;margin:auto;padding:calc(18px + env(safe-area-inset-top)) 16px calc(30px + env(safe-area-inset-bottom))}
h1{margin:0 0 5px;font-size:28px} .sub{color:var(--muted);margin-bottom:14px}

button,select{font:inherit} button{width:100%;border:0;border-radius:14px;padding:13px 14px;font-size:16px;font-weight:800;cursor:pointer;margin:5px 0}

.direction{text-align:left} .direction small{display:block;margin-top:4px;font-weight:600}.primary.direction small{color:#08361d}.secondary.direction small{color:var(--muted)}
.status{color:var(--muted);font-size:13px;line-height:1.4;margin:8px 0 12px}

.titleRow{display:flex;align-items:flex-start;justify-content:space-between;gap:10px} .screenTitle{font-size:22px;font-weight:850} .dayPill{font-size:12px;padding:6px 9px;border-radius:999px;background:rgba(69,212,131,.13);color:#9af1ba;white-space:nowrap}

const $=id=>document.getElementById(id);

function actualDayType(){
  const d=new Date().getDay();
  return d===6?"sat":d===0?"sun":"weekday";
}

function selectedDayType(){
  return selectedDay==="auto"?actualDayType():selectedDay;
}

function nextDateFor(type){
  const now=new Date();
  const d=new Date(now);
  d.setHours(0,0,0,0);
  if(type==="auto") return d;
  const target=type==="weekday"?1:type==="sat"?6:0;
  let delta=(target-d.getDay()+7)%7;
  if(type==="weekday" && d.getDay()>=1 && d.getDay()<=5) delta=0;
  if((type==="sat"&&d.getDay()===6)||(type==="sun"&&d.getDay()===0)) delta=0;
  d.setDate(d.getDate()+delta);
  return d;
}

function parseTime(str,date){
  const parts=str.split(" ");
  const hm=parts[0].split(":").map(Number);
  let h=hm[0],m=hm[1];
  const ap=parts[1];
  if(ap==="PM"&&h!==12)h+=12;
  if(ap==="AM"&&h===12)h=0;
  const out=new Date(date);
  out.setHours(h,m,0,0);
  return out;
}

function tripsFor(key,serviceDate){
  const source=routeData[key].trips;
  let previous=null;
  return source.map((pair,index)=>{
    let depDate=parseTime(pair[0],serviceDate);
    if(previous && depDate<=previous) depDate.setDate(depDate.getDate()+1);
    previous=depDate;
    return {dep:pair[0],arr:pair[1],depDate,isLast:index===source.length-1};
  });
}

function waitText(ms){
  const mins=Math.max(0,Math.ceil(ms/60000));
  const days=Math.floor(mins/1440);
  const left=mins%1440;
  const hrs=Math.floor(left/60);
  const rem=left%60;
  const parts=[];
  if(days)parts.push(days+" day"+(days===1?"":"s"));
  if(hrs)parts.push(hrs+" hr");
  if(rem||parts.length===0)parts.push(rem+" min");
  return parts.join(" ");
}

function countdownBadge(ms){
  if(ms<=-60000) return '<span>Departed</span>';
  if(ms<60000) return '<span class="badge red">Leaving now</span>';
  const mins=Math.ceil(ms/60000);
  const cls=mins<5?"red":mins<15?"orange":"green";
  return '<span class="badge '+cls+'">Leaves in '+waitText(ms)+'</span>';
}

function openDirection(dir){
  currentDirection=dir;
  selectedDay="auto";
  fullView=false;
  show139=false;
  $("daySelect").value="auto";
  $("home").classList.add("hidden");
  $("schedule").classList.remove("hidden");
  render();
}

function goHome(){
  $("schedule").classList.add("hidden");
  $("home").classList.remove("hidden");
}

function toggleFull(){
  fullView=!fullView;
  render();
}

function toggleRoute(){
  show139=!show139;
  render();
}

function renderTrips(title,key,notice,serviceDate){

  const all=tripsFor(key,serviceDate);
  const visible=fullView?all:all.filter(t=>{
    const diff=t.depDate-now;
    return diff>=0&&diff<=2*60*60*1000;
  });
  let content='<div class="sectionTitle">'+title+'</div>';
  if(notice) content+='<div class="warn">'+notice+'</div>';
  content+='<div class="note">'+routeData[key].note+'</div>';
  if(!visible.length) return content+'<div class="empty">No buses in this view.</div>';
  content+=visible.map((t,i)=>{
    const diff=t.depDate-now;
    const last=t.isLast?'<span class="badge last">Last Bus</span>':'';
    return '<div class="trip '+(!fullView&&i===0?"next":"")+'">'+
      '<div><div class="time">'+t.dep+'</div><div class="route">Depart</div></div>'+
      '<div class="arrow">→</div>'+
      '<div class="right"><div class="time">'+t.arr+'</div><div class="route">Arrive</div></div>'+
      '<div class="meta">'+last+countdownBadge(diff)+'</div></div>';
  }).join("");
  return content;
}

function render(){
  const dir=directions[currentDirection];
  const type=selectedDayType();
  const serviceDate=nextDateFor(selectedDay);
  const dateText=serviceDate.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});
  $("screenTitle").textContent=dir.title;
  $("dayPill").textContent=(type==="weekday"?"Mon–Fri":type==="sat"?"Saturday":"Sunday")+" · "+dateText;
  $("fullBtn").textContent=fullView?"⏱ Show Next 2 Hours":"📅 View Full Schedule";

  if(type==="sat"||type==="sun"){
    $("routeToggleBtn").classList.add("hidden");
    $("routeText").textContent="Route 139: "+dir.altRoute;
    const key=type==="sat"?dir.sat:dir.sun;
    $("tripList").innerHTML=renderTrips("Route 139 "+(type==="sat"?"Saturday":"Sunday")+" Service",key,"Route 131 does not operate on weekends.",serviceDate);
    return;
  }

  $("routeToggleBtn").classList.remove("hidden");
  $("routeToggleBtn").textContent=show139?"🚌 Show 131":"🚌 Show 139 Option";
  $("routeText").textContent=(show139?"Route 139: "+dir.altRoute:"Route 131: "+dir.mainRoute);
  if(show139){
    $("tripList").innerHTML=renderTrips("Route 139",dir.alt,"",serviceDate);
    return;
  }

  const mainTrips=tripsFor(dir.main,serviceDate);
  const now=new Date();
  const mainNext=mainTrips.filter(t=>t.depDate-now>=0&&t.depDate-now<=2*60*60*1000);
  let output=renderTrips("Route 131",dir.main,"",serviceDate);
  if(!fullView&&mainNext.length===0){
    const altTrips=tripsFor(dir.alt,serviceDate).filter(t=>t.depDate-now>=0&&t.depDate-now<=2*60*60*1000);
    if(altTrips.length){
      output+=renderTrips("Route 139 Backup",dir.alt,"No Route 131 buses in the next 2 hours. Showing Route 139.",serviceDate);
    }
  }
  $("tripList").innerHTML=output;
}

function useLocation(){
  const status=$("locationStatus");
  const btn=$("locationBtn");
  if(!window.isSecureContext){
    status.textContent="Location requires the HTTPS GitHub Pages link.";
    return;
  }
  if(!navigator.geolocation){
    status.textContent="Location is not supported. Choose a direction below.";
    return;
  }
  btn.disabled=true;
  btn.textContent="Finding location…";
  navigator.geolocation.getCurrentPosition(pos=>{
    const lat=pos.coords.latitude,lon=pos.coords.longitude;
    const rad=x=>x*Math.PI/180;
    const dist=(a,b,c,d)=>{
      const R=3958.8,dl=rad(c-a),dn=rad(d-b);
      const q=Math.sin(dl/2)**2+Math.cos(rad(a))*Math.cos(rad(c))*Math.sin(dn/2)**2;
      return 2*R*Math.asin(Math.sqrt(q));
    };
    const airportNJ=dist(lat,lon,40.4383,-74.3037);
    const pabt=dist(lat,lon,40.7569,-73.9903);
    const dir=airportNJ<=pabt?"going":"back";
    status.textContent="Nearest commute side detected. Opening "+(dir==="going"?"Going":"Coming Back")+".";
    btn.disabled=false;btn.textContent="📍 Use My Location";
    openDirection(dir);
  },()=>{
    status.textContent="Location could not be detected. Choose a direction below.";
    btn.disabled=false;btn.textContent="📍 Try My Location Again";
  },{enableHighAccuracy:true,timeout:15000,maximumAge:60000});
}

$("goingBtn").addEventListener("click",()=>openDirection("going"));
$("backBtn").addEventListener("click",()=>openDirection("back"));
$("homeBtn").addEventListener("click",goHome);
$("fullBtn").addEventListener("click",toggleFull);
$("routeToggleBtn").addEventListener("click",toggleRoute);
$("locationBtn").addEventListener("click",useLocation);
$("daySelect").addEventListener("change",e=>{
  selectedDay=e.target.value;
  fullView=selectedDay!=="auto";
  render();
});

setInterval(()=>{
  if(!$("schedule").classList.contains("hidden")) render();
},60000);
</script>
