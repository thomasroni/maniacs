function detectLocation(){const status=document.getElementById('locationStatus');if(!navigator.geolocation){status.textContent='Location not supported. Use Swap if needed.';renderHome();return;}status.textContent='Checking your location…';navigator.geolocation.getCurrentPosition(pos=>{const here={lat:pos.coords.latitude,lon:pos.coords.longitude};const dNJ=Math.min(distanceMiles(here,stops.ernston),distanceMiles(here,stops.oldbridge));const dNY=distanceMiles(here,stops.pabt);if(dNJ<=dNY){order=['going','back'];status.textContent=`Nearest commute side: New Jersey (${dNJ.toFixed(1)} mi). Showing Going first.`;}else{order=['back','going'];status.textContent=`Nearest commute side: Port Authority (${dNY.toFixed(1)} mi). Showing Coming Back first.`;}localStorage.setItem('busOrder',JSON.stringify(order));renderHome();if(!autoOpened){autoOpened=true;openDirection(order[0]);}},()=>{status.textContent='Location permission not available. Showing saved/default order.';renderHome();},{enableHighAccuracy:true,timeout:8000,maximumAge:60000});}
function swapOrder(){order=[...order].reverse();localStorage.setItem('busOrder',JSON.stringify(order));document.getElementById('locationStatus').textContent='Manual order saved.';renderHome();}
function distanceMiles(a,b){const R=3958.8,toRad=x=>x*Math.PI/180;const dLat=toRad(b.lat-a.lat),dLon=toRad(b.lon-a.lon),lat1=toRad(a.lat),lat2=toRad(b.lat);const h=Math.sin(dLat/2)**2+Math.cos(lat1)*Math.cos(lat2)*Math.sin(dLon/2)**2;return 2*R*Math.asin(Math.sqrt(h));}
function parseTimeOnDate(t,baseDate){const [hm,ap]=t.split(' ');let [h,m]=hm.split(':').map(Number);if(ap==='PM'&&h!==12)h+=12;if(ap==='AM'&&h===12)h=0;const d=new Date(baseDate);d.setHours(h,m,0,0);return d;}
function tripObjects(key){const base=new Date();base.setHours(0,0,0,0);let previous=null;const source=routeData[key].trips;return source.map((x,index)=>{let depDate=parseTimeOnDate(x[0],base);if(previous&&depDate<=previous)depDate.setDate(depDate.getDate()+1);previous=depDate;return{dep:x[0],arr:x[1],date:depDate,min:Math.round((depDate-new Date())/60000),isLast:index===source.length-1};});}
function dayType(){
  if(selectedSchedule!=='auto')return selectedSchedule;
  const d=new Date().getDay();
  return d===6?'sat':d===0?'sun':'weekday';
}
function isWeekend(){return dayType()!=='weekday';}
function changeScheduleDay(value){
  selectedSchedule=value;
  full=true;
  document.getElementById('toggleBtn').textContent='⏱ Show Next 2 Hours';
  render();
}
function formatWait(min){const total=Math.max(0,Math.round(min));if(total<60)return total+' min';const hr=Math.floor(total/60),mins=total%60;return mins===0?hr+' hr':hr+' hr '+mins+' min';}
function badge(min){const text='Leaves in '+formatWait(min);if(min<5)return['red',text];if(min<15)return['orange',text];return['green',text];}
function getTrips(key,onlyNext=true){let trips=tripObjects(key);return onlyNext?trips.filter(x=>x.min>=0&&x.min<=120):trips;}
function renderTrips(title,key,notice){const box=document.createElement('div');box.innerHTML=`<div class="subhead">${title}</div>`;if(notice)box.innerHTML+=`<div class="warnBox">${notice}</div>`;const d=routeData[key];box.innerHTML+=`<div class="gate">${d.note}</div>`;let trips=getTrips(key,!full);if(trips.length===0){box.innerHTML+='<div class="empty">No buses in this view.</div>';return box;}trips.forEach((x,i)=>{const r=document.createElement('div');r.className='row';let b='';if(!full&&i===0){const bb=badge(x.min);b=`<span class="badge ${bb[0]}">${bb[1]}</span>`;}const last=x.isLast?'<span class="badge lastBus">Last Bus</span>':'';r.innerHTML=`<div>${b}${last}<div class="time">${x.dep}</div><div class="label">Depart</div></div><div class="arrow">→</div><div><div class="time">${x.arr}</div><div class="label">Arrive</div></div>`;box.appendChild(r);});return box;}

 document.getElementById('dirRoute').textContent=weekend?`139: ${d.fallbackRoute}`:(showAlt?`139: ${d.fallbackRoute}`:`131: ${d.route}`);
 document.getElementById('toggleBtn').textContent=full?'⏱ Show Next 2 Hours':'📅 View Full Schedule';
 const altBtn=document.getElementById('show139Btn');
 altBtn.style.display=weekend?'none':'block';
 altBtn.textContent=showAlt?'🚌 Show 131':'🚌 Show 139 Option';
 const list=document.getElementById('list');list.innerHTML='';
 if(weekend){
   list.appendChild(renderTrips(`Route 139 ${dt==='sat'?'Saturday':'Sunday'} Service`,weekendKey,'Route 131 does not operate on weekends. Showing Route 139 weekend service.'));
   return;
 }
 const mainNext=getTrips(d.mainKey,true);
 if(showAlt){list.appendChild(renderTrips('Route 139 Option',d.altKey,''));return;}
 list.appendChild(renderTrips('Route 131',d.mainKey,''));
 if(!full&&mainNext.length===0){
   const altNext=getTrips(d.altKey,true);
   if(altNext.length>0)list.appendChild(renderTrips('Route 139 Backup',d.altKey,'No 131 buses in the next 2 hours. Showing 139 backup.'));
   else list.innerHTML+='<div class="empty">No 131 or 139 buses found in the next 2 hours.</div>';
 }
}
function openDirection(dir){currentDir=dir;full=false;showAlt=false;selectedSchedule='auto';document.getElementById('scheduleDay').value='auto';document.getElementById('home').classList.add('hidden');document.getElementById('scheduleScreen').classList.remove('hidden');render();}
function showHome(){document.getElementById('scheduleScreen').classList.add('hidden');document.getElementById('home').classList.remove('hidden');renderHome();}
function toggleFull(){full=!full;render();}
function toggle139(){showAlt=!showAlt;full=false;render();}
function tick(){
  document.getElementById('nowText').textContent=new Date().toLocaleTimeString([],{hour:'numeric',minute:'2-digit'});
  const dt=dayType();
  const prefix=selectedSchedule==='auto'?'Today · ':'';
  document.getElementById('dayLabel').textContent=prefix+(dt==='sat'?'Saturday schedule':dt==='sun'?'Sunday schedule':'Monday–Friday schedule');
  if(!document.getElementById('scheduleScreen').classList.contains('hidden'))render();
}
function init(){try{const saved=JSON.parse(localStorage.getItem('busOrder'));if(Array.isArray(saved)&&saved.length===2)order=saved;}catch(e){}renderHome();detectLocation();tick();}init();setInterval(tick,60000);
</script>
